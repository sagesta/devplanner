services:
  devplanner-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: devplanner
      POSTGRES_USER: devplanner
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devplanner}
    volumes:
      - devplanner_db_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devplanner -d devplanner"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  devplanner-redis:
    image: redis:7-alpine
    volumes:
      - devplanner_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  radicale:
    image: tomsquest/docker-radicale:latest
    volumes:
      - radicale_data:/data
    ports:
      - "${RADICALE_PORT:-5232}:5232"
    restart: unless-stopped
    # Image ships a ~30s curl healthcheck → noisy INFO logs. Nothing in this compose waits on Radicale health.
    healthcheck:
      disable: true

  # --- App (default `docker compose up -d` starts db, redis, radicale, api, web, worker)
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./data/reviews:/app/reviews
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgresql://devplanner:${DB_PASSWORD:-devplanner}@devplanner-db:5432/devplanner
      REDIS_URL: redis://devplanner-redis:6379
    depends_on:
      devplanner-db:
        condition: service_healthy
      devplanner-redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # If NEXT_PUBLIC_API_URL is another subdomain, set NEXTAUTH_COOKIE_DOMAIN=.parentdomain in .env
  # so the session cookie is sent to the API (see README "401 Unauthorized").
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://devplanner:${DB_PASSWORD:-devplanner}@devplanner-db:5432/devplanner
    depends_on:
      devplanner-db:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DEVPLANNER_PROCESS: worker
      DATABASE_URL: postgresql://devplanner:${DB_PASSWORD:-devplanner}@devplanner-db:5432/devplanner
      REDIS_URL: redis://devplanner-redis:6379
    depends_on:
      devplanner-db:
        condition: service_healthy
      devplanner-redis:
        condition: service_started
      api:
        condition: service_healthy
    restart: unless-stopped

  # Optional: one-off schema push from the host repo (no image rebuild). Usually unnecessary — the API container runs push on start.
  # docker compose --profile tools run --rm migrate
  migrate:
    profiles: ["tools"]
    image: node:20-bookworm-slim
    working_dir: /src
    volumes:
      - .:/src
    environment:
      DATABASE_URL: postgresql://devplanner:${DB_PASSWORD:-devplanner}@devplanner-db:5432/devplanner
    command: ["sh", "-c", "npm ci && npm run db:migrate -w @devplanner/api"]
    depends_on:
      devplanner-db:
        condition: service_healthy

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/log:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml
    restart: unless-stopped

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    ports:
      - "8080:8080"
    environment:
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/nginx crowdsecurity/ssh-bf"
    volumes:
      - crowdsec-data:/etc/crowdsec
      - crowdsec-db:/var/lib/crowdsec/data
    restart: unless-stopped

volumes:
  devplanner_db_data:
  devplanner_redis_data:
  radicale_data:
  loki-data:
  prometheus-data:
  crowdsec-data:
  crowdsec-db:
